limit_req_zone $binary_remote_addr zone=setadinfo_api:10m rate=30r/s;

server {
  listen 80;
  server_name setadinfo.example.com;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name setadinfo.example.com;

  ssl_certificate     /etc/letsencrypt/live/setadinfo.example.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/setadinfo.example.com/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  location / {
    proxy_pass http://127.0.0.1:18731;
    proxy_http_version 1.1;
    proxy_connect_timeout 10s;
    proxy_read_timeout 90s;
    proxy_send_timeout 90s;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location /api/ {
    limit_req zone=setadinfo_api burst=60 nodelay;
    proxy_pass http://127.0.0.1:18731;
    proxy_http_version 1.1;
    proxy_connect_timeout 10s;
    proxy_read_timeout 90s;
    proxy_send_timeout 90s;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Real-IP $remote_addr;
  }
}
