x-app-environment: &app-environment
  APP_ENV: production
  APP_BASE_URL: ${APP_BASE_URL:-http://localhost}
  ADMIN_USERNAME: ${ADMIN_USERNAME:?ADMIN_USERNAME is required}
  ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
  SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
  DATABASE_URL: postgresql+psycopg://setadinfo:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@db:5432/setadinfo
  REDIS_URL: redis://redis:6379/0
  SETAD_BASE_URL: https://gw.setadiran.ir/api/centralboard
  SETAD_HTTP_TIMEOUT: 15
  SETAD_RETRY_ATTEMPTS: 3
  SETAD_RETRY_DELAY_SECONDS: 0.6
  SETAD_CACHE_TTL_SECONDS: 60
  SETAD_STALE_CACHE_TTL_SECONDS: 86400
  SETAD_PAGE_SIZE: 50
  SETAD_MAX_PAGES_PER_RUN: 20
  SETAD_MIN_INTERVAL_MINUTES: 15
  RUBIKA_BOT_TOKEN: ${RUBIKA_BOT_TOKEN:-}
  RUBIKA_DEFAULT_CHAT_ID: ${RUBIKA_DEFAULT_CHAT_ID:-}

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: setadinfo
      POSTGRES_USER: setadinfo
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - setadinfo-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U setadinfo -d setadinfo"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment: *app-environment
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3).read()"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: celery -A app.tasks.celery_app worker -l info
    environment: *app-environment
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  beat:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: celery -A app.tasks.celery_app beat -l info
    environment: *app-environment
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: frontend-workbench/Dockerfile
    ports:
      - "127.0.0.1:18731:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 15s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  setadinfo-db:
